[build]
  publish = "."


[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"


[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/mlb/*"
  to = "/.netlify/functions/mlb-proxy/:splat"
  status = 200
